apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  host: {{ .Release.Name }}
  trafficPolicy:
    loadBalancer:
      simple: {{ .Values.istio.loadBalancer }}
  subsets:
    - name: v1
      labels:
        version: v1