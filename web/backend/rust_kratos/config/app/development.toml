[kratos]
admin_url = "http://localhost:4434"
public_url = "http://localhost:4433"
timeout_secs = 120
connect_timeout_secs = 30
pool_idle_timeout_secs = 120
pool_max_idle_per_host = 10
max_retries = 3
retry_delay_ms = 1000
accept_invalid_certs = true

[server]
host = "127.0.0.1"
port = 8080
log_level = "debug"
cors_allowed_origins = ["*"]

[redis]
url = "redis://127.0.0.1:6379"
cache_ttl_secs = 300
max_retries = 5
retry_delay_ms = 2000
